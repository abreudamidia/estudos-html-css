<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Midias em HTML 5</title>
</head>
<body>
    <h1>Imagem dinâmica</h1>
    <p>Tente abrir este site em vários dispositivos diferentes ou simplesmente aumente e diminua o tamanho do seu navegador.</p>

    <Picture>
        <source media="(max-width: 750px )" srcset="imagens/foto-p.png" type="image/png">
        <source media="(max-width: 1050px)" srcset="imagens/foto-m.png" type="image/png">
        <img src="imagens/foto-g.png" alt="Imagem flexível">
    </Picture>
    <h1>Rperoduzindo audio</h1>
    <p>Vamos aprender a reprosuzir audio no HTML-5</p>
    <audio src="midia/Appearing Nowhere (feat. Rusty James Miller) - Zenith Bikini.mp3" controls autoplay></audio>

   
</body>
</html>
