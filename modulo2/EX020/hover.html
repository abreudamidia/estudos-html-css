<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exemplo de HOVER</title>
    <style>
        body{
            font-family: Arial, Helvetica, sans-serif;
        }
        div >p{
            display: none;
        }
        div:hover >p{
            display: block;
            color: rgb(226, 226, 226);
            background-color: rgb(223, 17, 17);
            width: 300px;
        }
        div:hover{
            color: brown;
        }
    </style>
</head>
<body>
    <h1>EXemplo de hover</h1>
    <p>Passe o mouse sobre o texto abaixo</p>
    <div>
        Passe o mouse aqui
        <p>TEXTO ESCONDIDO</p>
    </div>
    
</body>
</html>
