<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fontes Externas</title>
    <style>
        @font-face {
            font-family: fontebebas;
            src: url('Bebas-Regular.otf') format('opentype'), url('Bebas-Regular.ttf') format('truetype');
            font-weight: normal;
            font-style:  normal;
        }
        body{
            font-family: fontebebas, Helvetica, sans-serif;
            font-weight: normal;
        }
        h1{
            font-family: Arial, Helvetica, sans-serif ;
            font-size: 3em;
        }

    </style>
</head>
<body>
    <h1>Título</h1>
    <p>Lorem ipsum dolor sit amet consectetur adipisicing elit. Tenetur vel deleniti itaque provident rem corporis soluta totam repellendus, repudiandae aut possimus ad velit quas quidem placeat quis libero facilis fugit!</p>
    
</body>
</html>
